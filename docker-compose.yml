version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    container_name: eko-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-eko_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: postgres -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eko} -d ${POSTGRES_DB:-eko_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eko-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eko-backend
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-eko}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eko_ai}
      - REDIS_URL=redis://redis:6379/0
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.kimi.com/coding/v1}
      - KIMI_MODEL=${KIMI_MODEL:-kimi-for-coding}
      - KIMI_EMBEDDING_MODEL=${KIMI_EMBEDDING_MODEL:-moonshot-v1-embedding-1024}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:14b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - MINIMAX_EMBEDDING_MODEL=${MINIMAX_EMBEDDING_MODEL:-embedding-001}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - VAPI_API_KEY=${VAPI_API_KEY}
      - VAPI_PHONE_NUMBER_ID=${VAPI_PHONE_NUMBER_ID}
      - VAPI_INBOUND_PHONE_NUMBER=${VAPI_INBOUND_PHONE_NUMBER}
      - VAPI_EKO_ASSISTANT_ID=${VAPI_EKO_ASSISTANT_ID}
      - VAPI_BLACK_VOLT_ASSISTANT_ID=${VAPI_BLACK_VOLT_ASSISTANT_ID}
      - ENDER_NOTIFICATION_EMAIL=${ENDER_NOTIFICATION_EMAIL:-ender@ekoaiautomation.com}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - AUTO_REPLY_ENABLED=${AUTO_REPLY_ENABLED:-true}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET}
      - RESEND_INBOUND_DOMAIN=${RESEND_INBOUND_DOMAIN:-biz.ekoaiautomation.com}
      - AUTO_CREATE_LEAD_FROM_INBOUND=${AUTO_CREATE_LEAD_FROM_INBOUND:-true}
      - OUTSCRAPER_API_KEY=${OUTSCRAPER_API_KEY}
      - YELP_API_KEY=${YELP_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY}
      - CAL_COM_API_KEY=${CAL_COM_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER}
      - STRIPE_PRICE_GROWTH=${STRIPE_PRICE_GROWTH}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backups:/app/backups
      - /home/enderj/.local/share/uv/tools/kimi-cli:/opt/kimi-cli
      - /home/enderj/.kimi:/root/.kimi
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name: eko-celery (removed for scaling)
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-eko}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eko_ai}
      - REDIS_URL=redis://redis:6379/0
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.kimi.com/coding/v1}
      - KIMI_MODEL=${KIMI_MODEL:-kimi-for-coding}
      - KIMI_EMBEDDING_MODEL=${KIMI_EMBEDDING_MODEL:-moonshot-v1-embedding-1024}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:14b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - MINIMAX_EMBEDDING_MODEL=${MINIMAX_EMBEDDING_MODEL:-embedding-001}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - VAPI_API_KEY=${VAPI_API_KEY}
      - VAPI_PHONE_NUMBER_ID=${VAPI_PHONE_NUMBER_ID}
      - VAPI_INBOUND_PHONE_NUMBER=${VAPI_INBOUND_PHONE_NUMBER}
      - VAPI_EKO_ASSISTANT_ID=${VAPI_EKO_ASSISTANT_ID}
      - VAPI_BLACK_VOLT_ASSISTANT_ID=${VAPI_BLACK_VOLT_ASSISTANT_ID}
      - ENDER_NOTIFICATION_EMAIL=${ENDER_NOTIFICATION_EMAIL:-ender@ekoaiautomation.com}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - AUTO_REPLY_ENABLED=${AUTO_REPLY_ENABLED:-true}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET}
      - RESEND_INBOUND_DOMAIN=${RESEND_INBOUND_DOMAIN:-biz.ekoaiautomation.com}
      - AUTO_CREATE_LEAD_FROM_INBOUND=${AUTO_CREATE_LEAD_FROM_INBOUND:-true}
      - OUTSCRAPER_API_KEY=${OUTSCRAPER_API_KEY}
      - YELP_API_KEY=${YELP_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY}
      - CAL_COM_API_KEY=${CAL_COM_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER}
      - STRIPE_PRICE_GROWTH=${STRIPE_PRICE_GROWTH}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - ./backups:/app/backups
      - /home/enderj/.local/share/uv/tools/kimi-cli:/opt/kimi-cli
      - /home/enderj/.kimi:/root/.kimi
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=prefork --concurrency=4

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eko-celery-beat
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-eko}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eko_ai}
      - REDIS_URL=redis://redis:6379/0
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.kimi.com/coding/v1}
      - KIMI_MODEL=${KIMI_MODEL:-kimi-for-coding}
      - KIMI_EMBEDDING_MODEL=${KIMI_EMBEDDING_MODEL:-moonshot-v1-embedding-1024}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:14b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
      - MINIMAX_EMBEDDING_MODEL=${MINIMAX_EMBEDDING_MODEL:-embedding-001}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - VAPI_API_KEY=${VAPI_API_KEY}
      - VAPI_PHONE_NUMBER_ID=${VAPI_PHONE_NUMBER_ID}
      - VAPI_INBOUND_PHONE_NUMBER=${VAPI_INBOUND_PHONE_NUMBER}
      - VAPI_EKO_ASSISTANT_ID=${VAPI_EKO_ASSISTANT_ID}
      - VAPI_BLACK_VOLT_ASSISTANT_ID=${VAPI_BLACK_VOLT_ASSISTANT_ID}
      - ENDER_NOTIFICATION_EMAIL=${ENDER_NOTIFICATION_EMAIL:-ender@ekoaiautomation.com}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - AUTO_REPLY_ENABLED=${AUTO_REPLY_ENABLED:-true}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET}
      - RESEND_INBOUND_DOMAIN=${RESEND_INBOUND_DOMAIN:-biz.ekoaiautomation.com}
      - AUTO_CREATE_LEAD_FROM_INBOUND=${AUTO_CREATE_LEAD_FROM_INBOUND:-true}
      - OUTSCRAPER_API_KEY=${OUTSCRAPER_API_KEY}
      - YELP_API_KEY=${YELP_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY}
      - CAL_COM_API_KEY=${CAL_COM_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER}
      - STRIPE_PRICE_GROWTH=${STRIPE_PRICE_GROWTH}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - ./backups:/app/backups
      - /home/enderj/.local/share/uv/tools/kimi-cli:/opt/kimi-cli
      - /home/enderj/.kimi:/root/.kimi
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://eko-backend:8000}
    container_name: eko-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ~/EkoContentStudio:/Users/enderj/EkoContentStudio:ro
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://eko-backend:8000}
      - INTERNAL_API_URL=http://eko-backend:8000
    depends_on:
      - backend

  frontend-dev:
    image: node:20-alpine
    container_name: eko-frontend-dev
    profiles: ["dev"]
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://eko-backend:8000
    command: ["sh", "-c", "npm install && npm run dev"]
    depends_on:
      - backend

  pipeline:
    build:
      context: /home/enderj/EkoContentStudio
      dockerfile: Dockerfile.pipeline
    container_name: eko-pipeline
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ~/EkoContentStudio/config:/app/config
      - ~/EkoContentStudio/output:/app/output
      - ~/EkoContentStudio/video_uploader.py:/app/video_uploader.py
      - ~/EkoContentStudio/produce_content.py:/app/scripts/produce_content.py
      - ~/EkoContentStudio/buffer_publisher.py:/app/buffer_publisher.py
      - ~/EkoContentStudio/publish_pipeline.py:/app/publish_pipeline.py
      - ~/EkoContentStudio/pipeline_api.py:/app/pipeline_api.py
    environment:
      - BUFFER_API_KEY=${BUFFER_API_KEY:-au7VyBXcqYkOpftcaLuE7awhoSHBoXEAM-WPJWh06Fv}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-sk_448865ab97d9012f53c3ddf4edfdfd49d5ff796cff05f24f}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-Cpm6N9BNC1M75bYS7kO1}
      - HF_API_TOKEN=${HF_API_TOKEN:-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}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.io/anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.kimi.com/coding/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY:-pcp_board_68ed2bc4520167360cb1ae178b2b3285692f536e08aa7300}
      - PAPERCLIP_API_URL=${PAPERCLIP_API_URL:-http://100.88.47.99:3100}
      - PAPERCLIP_CNT_COMPANY_ID=${PAPERCLIP_CNT_COMPANY_ID:-211df8dd-5c40-4407-86d0-33d3983e031a}
      - FUNNEL_BASE_URL=${FUNNEL_BASE_URL:-https://ender-rog.tail25dc73.ts.net}
      - FUNNEL_MEDIA_DIR=/app/output/media

volumes:
  pgdata:
  redisdata:
