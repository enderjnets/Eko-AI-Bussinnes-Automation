version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    container_name: eko-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eko_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-eko_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eko} -d ${POSTGRES_DB:-eko_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eko-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eko-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-eko}:${POSTGRES_PASSWORD:-eko_dev_pass}@db:5432/${POSTGRES_DB:-eko_ai}
      - REDIS_URL=redis://redis:6379/0
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.kimi.com/coding/v1}
      - KIMI_MODEL=${KIMI_MODEL:-kimi-for-coding}
      - KIMI_EMBEDDING_MODEL=${KIMI_EMBEDDING_MODEL:-moonshot-v1-embedding-1024}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - OUTSCRAPER_API_KEY=${OUTSCRAPER_API_KEY}
      - YELP_API_KEY=${YELP_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY}
      - CAL_COM_API_KEY=${CAL_COM_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eko-celery
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-eko}:${POSTGRES_PASSWORD:-eko_dev_pass}@db:5432/${POSTGRES_DB:-eko_ai}
      - REDIS_URL=redis://redis:6379/0
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.kimi.com/coding/v1}
      - KIMI_MODEL=${KIMI_MODEL:-kimi-for-coding}
      - KIMI_EMBEDDING_MODEL=${KIMI_EMBEDDING_MODEL:-moonshot-v1-embedding-1024}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - OUTSCRAPER_API_KEY=${OUTSCRAPER_API_KEY}
      - YELP_API_KEY=${YELP_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY}
      - CAL_COM_API_KEY=${CAL_COM_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eko-celery-beat
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-eko}:${POSTGRES_PASSWORD:-eko_dev_pass}@db:5432/${POSTGRES_DB:-eko_ai}
      - REDIS_URL=redis://redis:6379/0
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.kimi.com/coding/v1}
      - KIMI_MODEL=${KIMI_MODEL:-kimi-for-coding}
      - KIMI_EMBEDDING_MODEL=${KIMI_EMBEDDING_MODEL:-moonshot-v1-embedding-1024}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - OUTSCRAPER_API_KEY=${OUTSCRAPER_API_KEY}
      - YELP_API_KEY=${YELP_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY}
      - CAL_COM_API_KEY=${CAL_COM_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eko-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
